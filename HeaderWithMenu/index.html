<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Header</title>
  <link rel="stylesheet" href="main.css" />
</head>

<body>

    <a class="logo" href="https://alaminn.com">Mylogo</a>

    <nav>
